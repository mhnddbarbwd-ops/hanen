<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر حنين - حاسبة التسعير الذكية</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap');

        :root {
            --primary: #F85C05;
            --primary-hover: #DE3401;
            --primary-light: #F29065;
            --bg: #FDFCFC;
            --surface: #ffffff;
            --card: #ffffff;
            --border: #f0e2d8;
            --border-focus: #F85C05;
            --accent: #F29065;
            --text: #1a1a1a;
            --text-muted: #6b5a4e;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gold: #F85C05;
            --shadow-sm: 0 1px 2px rgba(248,92,5,0.08);
            --shadow-md: 0 4px 12px rgba(248,92,5,0.1);
            --shadow-lg: 0 12px 32px rgba(248,92,5,0.12);
            --overlay-bg: rgba(26,26,26,0.4);
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --surface: #2a2a2a;
            --card: #2a2a2a;
            --border: #3a3a3a;
            --border-focus: #F85C05;
            --primary: #F85C05;
            --primary-hover: #DE3401;
            --accent: #F29065;
            --text: #ffffff;
            --text-muted: #a0a0a0;
            --success: #34d399;
            --danger: #fb7185;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.5);
            --overlay-bg: rgba(0,0,0,0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
            padding-bottom: 60px;
        }

        /* نافذة تأكيد الحذف */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--overlay-bg); backdrop-filter: blur(6px);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal {
            background: var(--card); border-radius: var(--radius-xl);
            padding: 32px 28px; max-width: 360px; width: 90%;
            box-shadow: var(--shadow-lg); text-align: center;
            border: 1px solid var(--border);
        }
        .modal h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--text); }
        .modal p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
        .modal-actions { display: flex; gap: 12px; justify-content: center; }
        .btn-modal-confirm { background: var(--danger); color: white; padding: 10px 24px; border-radius: var(--radius-lg); font-weight: 700; border: none; cursor: pointer; }
        .btn-modal-cancel { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 10px 24px; border-radius: var(--radius-lg); font-weight: 700; cursor: pointer; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        [data-theme="dark"] header { background: rgba(26,26,26,0.9); }
        .brand {
            display: flex; align-items: center; gap: 10px;
            font-size: 20px; font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; letter-spacing: -0.5px;
        }
        .brand svg { width: 24px; height: 24px; fill: none; stroke: var(--primary); stroke-width: 2; }
        .nav-btn {
            background: var(--surface); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .nav-btn:hover { border-color: var(--primary); color: var(--primary); }
        .nav-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .container { max-width: 560px; margin: 32px auto 0; padding: 0 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 28px; margin-bottom: 24px; box-shadow: var(--shadow-md); }
        .field { margin-bottom: 20px; }
        label { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; display: block; }
        input, select {
            width: 100%; background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-lg); color: var(--text); font-family: 'Cairo', sans-serif;
            font-size: 15px; font-weight: 500; padding: 14px 16px; outline: none; box-shadow: var(--shadow-sm);
        }
        input:focus, select:focus { border-color: var(--border-focus); box-shadow: 0 0 0 4px rgba(248,92,5,0.12); }
        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .result-card { background: var(--card); border: 2px solid var(--primary); border-radius: var(--radius-xl); padding: 32px 28px; box-shadow: var(--shadow-lg); }
        .big-price { text-align: center; margin-bottom: 28px; }
        .big-price .label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .big-price .amount { font-size: clamp(38px, 8vw, 46px); font-weight: 900; color: var(--text); }
        .big-price .currency { font-size: 20px; color: var(--primary); font-weight: 700; margin-right: 4px; }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 24px; }
        .btn-base {
            font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 700; padding: 14px 20px;
            border-radius: var(--radius-lg); border: none; display: flex; align-items: center;
            justify-content: center; gap: 8px; cursor: pointer; transition: 0.2s; box-shadow: var(--shadow-sm);
        }
        .btn-base svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .btn-primary { background: var(--primary); color: #fff; grid-column: span 2; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-update { background: var(--primary); color: #fff; }
        .btn-cancel, .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

        .product-item {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between;
            align-items: center; box-shadow: var(--shadow-sm);
        }
        .p-name { font-weight: 700; font-size: 14px; color: var(--text); }
        .p-meta { font-size: 11px; color: var(--text-muted); }
        .p-price { font-weight: 800; color: var(--primary); font-size: 15px; }
        .icon-btn {
            background: transparent; border: none; width: 36px; height: 36px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .icon-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .icon-btn.edit-btn { color: var(--primary); }
        .icon-btn.delete-btn { color: var(--danger); }

        .empty-state { text-align: center; padding: 48px; color: var(--text-muted); border: 1px dashed var(--border); border-radius: var(--radius-lg); }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: var(--border); border-radius: 99px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--primary); border-radius: 50%; cursor: pointer; }

        .bottom-sheet {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0; padding: 32px 28px 48px;
            transform: translateY(100%); transition: transform 0.4s; z-index: 1000;
            max-height: 85vh; overflow-y: auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
        }
        .bottom-sheet.open { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: var(--overlay-bg); backdrop-filter: blur(8px); z-index: 998; opacity: 0; pointer-events: none; transition: 0.3s; }
        .overlay.open { opacity: 1; pointer-events: all; }
    </style>
</head>
<body>

    <!-- نافذة تأكيد الحذف -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <h3>تأكيد الحذف</h3>
            <p>هل أنت متأكد من رغبتك في حذف هذا الطلب؟ لا يمكن التراجع.</p>
            <div class="modal-actions">
                <button class="btn-modal-cancel" onclick="closeDeleteModal()">إلغاء</button>
                <button class="btn-modal-confirm" id="confirmDeleteBtn">حذف</button>
            </div>
        </div>
    </div>

    <header>
        <button class="nav-btn" onclick="toggleControlPanel()">
            <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="brand">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            متجر حنين
        </div>
        <button class="nav-btn" id="themeToggleBtn" onclick="toggleTheme()">
            <svg id="themeIcon" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        </button>
    </header>

    <div class="container">
        <div class="card">
            <div class="row2">
                <div class="field"><label>اسم العميل</label><input type="text" id="customerName" placeholder="اسم العميل"></div>
                <div class="field"><label>رقم العميل</label><input type="text" id="customerPhone" placeholder="رقم الجوال"></div>
            </div>
            <div class="field"><label>اسم المنتج</label><input type="text" id="productName" placeholder="اسم المنتج"></div>
            <div class="row2">
                <div class="field"><label>سعر الشراء (ر.س)</label><input type="number" id="priceSAR" placeholder="0" oninput="calculate()"></div>
                <div class="field"><label>تكلفة الشحن</label><input type="number" id="shipping" value="0" oninput="calculate()"></div>
            </div>
            <div class="field"><label>السعر الفعلي للعميل (اختياري)</label><input type="number" id="customerPrice" placeholder="اتركه فارغاً" oninput="calculate()"></div>
        </div>

        <div class="result-card">
            <div class="big-price"><div class="label" id="priceTypeLabel">سعر البيع الموصى به</div><div class="amount" id="finalPrice">0<span class="currency">ر.ي</span></div></div>
            <div class="result-row"><span>إجمالي التكاليف</span><span class="result-val" id="totalCost">0 ر.ي</span></div>
            <div class="result-row"><span>الضرائب والرسوم</span><span class="result-val" id="taxAmount">0 ر.ي</span></div>
            <div class="profit-bar"><div class="profit-fill" id="profitBar" style="width:0%"></div></div>
            <div class="profit-info"><span>التكلفة</span><span id="profitPct">الربح 0%</span></div>
        </div>

        <div class="actions" id="actionButtons">
            <button class="btn-base btn-primary" id="saveProductBtn" onclick="saveProduct()">
                <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
                حفظ الطلب
            </button>
            <button class="btn-base btn-update" id="updateProductBtn" onclick="updateProduct()" style="display:none;">
                <svg viewBox="0 0 24 24"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                تحديث الطلب
            </button>
            <button class="btn-base btn-cancel" id="cancelEditBtn" onclick="cancelEdit()" style="display:none;">
                <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
                إلغاء التعديل
            </button>
            <button class="btn-base btn-secondary" id="clearBtn" onclick="clearForm()">
                <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                مسح الحقول
            </button>
        </div>

        <div class="products-section" style="margin-top:40px">
            <div class="section-header" style="display:flex; justify-content:space-between; margin-bottom:18px">
                <h3 style="font-weight:800">قائمتك (<span id="productCount">0</span>)</h3>
                <button class="btn-base btn-secondary" onclick="exportCSV()" style="width:auto; padding:8px 14px; font-size:12px">
                    <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                    تصدير Excel
                </button>
            </div>
            <div id="productsList"><div class="empty-state">لا توجد أصناف</div></div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleControlPanel()"></div>
    <div class="bottom-sheet" id="controlPanel">
        <div style="width:40px;height:5px;background:var(--border);border-radius:99px;margin:0 auto 24px"></div>
        <h3 style="font-weight:800; margin-bottom:28px">الإعدادات الاستراتيجية</h3>
        <div class="row2">
            <div class="field"><label>سعر الصرف</label><input type="number" id="exchangeRate" value="141.5" min="1" onchange="saveSettings()"></div>
            <div class="field"><label>تكاليف إضافية</label><input type="number" id="otherCosts" value="0" min="0" onchange="saveSettings()"></div>
        </div>
        <div class="field"><label>شحن افتراضي</label><input type="number" id="defaultShipping" value="0" min="0" onchange="saveSettings()"></div>
        <div class="field">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px">
                <label style="margin:0">هامش الربح المستهدف</label>
                <span id="marginLabel" style="color:var(--primary); font-weight:800">30%</span>
            </div>
            <input type="range" id="marginRange" min="0" max="200" value="30" oninput="syncSlider(this.value)">
            <input type="number" id="marginInput" value="30" min="0" onchange="saveSettings()" style="margin-top:12px">
        </div>
        <div class="row2">
            <div class="field"><label>الضريبة %</label><input type="number" id="tax" value="0" min="0" max="100" onchange="saveSettings()"></div>
            <div class="field"><label>التقريب</label><select id="rounding" onchange="saveSettings()"><option value="none">بدون</option><option value="up50" selected>لأقرب 50</option><option value="up100">لأقرب 100</option></select></div>
        </div>
    </div>

    <script>
        // Firebase
        firebase.initializeApp({
            apiKey: "AIzaSyB__oAd7psqQUPh_FsvrUrjTruPvD9B8KM",
            authDomain: "hanen-7fa47.firebaseapp.com",
            projectId: "hanen-7fa47",
            storageBucket: "hanen-7fa47.firebasestorage.app",
            messagingSenderId: "417445614971",
            appId: "1:417445614971:web:eb92c786549cbbcab059de"
        });
        const db = firebase.firestore();
        db.enablePersistence({synchronizeTabs:true}).catch(()=>{});

        let settings = { exchangeRate:141.5, otherCosts:0, defaultShipping:0, margin:30, tax:0, rounding:'up50' };
        let products = [], editingId = null, deleteId = null;

        // إعدادات
        db.collection('settings').doc('global').onSnapshot(doc => {
            if(doc.exists) Object.assign(settings, doc.data());
            else db.collection('settings').doc('global').set(settings);
            applySettingsUI(); calculate();
        });

        function applySettingsUI() {
            document.getElementById('exchangeRate').value = settings.exchangeRate;
            document.getElementById('otherCosts').value = settings.otherCosts;
            document.getElementById('defaultShipping').value = settings.defaultShipping;
            document.getElementById('marginInput').value = settings.margin;
            document.getElementById('marginRange').value = settings.margin;
            document.getElementById('marginLabel').textContent = settings.margin + '%';
            document.getElementById('tax').value = settings.tax;
            document.getElementById('rounding').value = settings.rounding;
            if(!editingId) document.getElementById('shipping').value = settings.defaultShipping;
        }

        function saveSettings() {
            settings.exchangeRate = +document.getElementById('exchangeRate').value || 141.5;
            settings.otherCosts = +document.getElementById('otherCosts').value || 0;
            settings.defaultShipping = +document.getElementById('defaultShipping').value || 0;
            settings.margin = +document.getElementById('marginInput').value || 30;
            settings.tax = +document.getElementById('tax').value || 0;
            settings.rounding = document.getElementById('rounding').value;
            db.collection('settings').doc('global').set(settings, {merge:true});
            document.getElementById('marginLabel').textContent = settings.margin + '%';
            calculate();
        }

        function syncSlider(v) { document.getElementById('marginInput').value=v; saveSettings(); }

        function applyRounding(v) {
            if(settings.rounding==='none') return v;
            const n = parseInt(settings.rounding.replace('up','')) || 1;
            return Math.ceil(v/n)*n;
        }
        function fmt(n) { return n.toLocaleString('ar-EG',{maximumFractionDigits:0}); }

        function calculate() {
            const price = +document.getElementById('priceSAR').value || 0;
            const ship = +document.getElementById('shipping').value || settings.defaultShipping;
            const custPriceRaw = document.getElementById('customerPrice').value.trim();
            const custPrice = custPriceRaw === '' ? null : +custPriceRaw;
            const cost = price*settings.exchangeRate + ship + settings.otherCosts;
            const taxAmt = cost*(settings.tax/100);
            const withTax = cost+taxAmt;
            const raw = settings.margin>0 ? withTax/(1-settings.margin/100) : withTax;
            const suggested = applyRounding(raw);
            const final = custPrice !== null ? custPrice : suggested;
            const profit = final - withTax;
            document.getElementById('finalPrice').innerHTML = `${fmt(final)} <span class="currency">ر.ي</span>`;
            document.getElementById('priceTypeLabel').textContent = custPrice !== null ? 'السعر الفعلي للعميل' : 'سعر البيع الموصى به';
            document.getElementById('totalCost').textContent = `${fmt(cost)} ر.ي`;
            document.getElementById('taxAmount').textContent = `${fmt(taxAmt)} ر.ي`;
            document.getElementById('profitBar').style.width = final>0 ? Math.min((profit/final)*100,100)+'%' : '0%';
            document.getElementById('profitPct').textContent = `الربح ${final>0?(profit/final*100).toFixed(0):0}%`;
        }

        function clearForm() {
            document.getElementById('productName').value = '';
            document.getElementById('customerName').value = '';
            document.getElementById('customerPhone').value = '';
            document.getElementById('priceSAR').value = '';
            document.getElementById('customerPrice').value = '';
            document.getElementById('shipping').value = settings.defaultShipping;
            cancelEdit();
            calculate();
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('saveProductBtn').style.display = '';
            document.getElementById('updateProductBtn').style.display = 'none';
            document.getElementById('cancelEditBtn').style.display = 'none';
            document.getElementById('clearBtn').style.display = '';
        }

        function editProduct(product) {
            editingId = product.id;
            document.getElementById('customerName').value = product.customerName || '';
            document.getElementById('customerPhone').value = product.customerPhone || '';
            document.getElementById('productName').value = product.name;
            document.getElementById('priceSAR').value = product.priceSAR;
            document.getElementById('shipping').value = product.shipping;
            document.getElementById('customerPrice').value = product.customerPrice || '';
            document.getElementById('saveProductBtn').style.display = 'none';
            document.getElementById('updateProductBtn').style.display = '';
            document.getElementById('cancelEditBtn').style.display = '';
            document.getElementById('clearBtn').style.display = 'none';
            calculate();
            window.scrollTo({top:0, behavior:'smooth'});
        }

        async function saveProduct() {
            const name = document.getElementById('productName').value.trim() || 'منتج';
            const price = +document.getElementById('priceSAR').value || 0;
            const ship = +document.getElementById('shipping').value || settings.defaultShipping;
            const custPriceRaw = document.getElementById('customerPrice').value.trim();
            const custPrice = custPriceRaw === '' ? null : +custPriceRaw;
            const cost = price*settings.exchangeRate + ship + settings.otherCosts;
            const taxAmt = cost*(settings.tax/100);
            const withTax = cost+taxAmt;
            const raw = settings.margin>0 ? withTax/(1-settings.margin/100) : withTax;
            const suggested = applyRounding(raw);
            const final = custPrice !== null ? custPrice : suggested;
            await db.collection('products').add({
                name, priceSAR:price, shipping:ship, totalCost:cost, finalPrice:final,
                customerName: document.getElementById('customerName').value.trim(),
                customerPhone: document.getElementById('customerPhone').value.trim(),
                customerPrice: custPrice, profit: final - withTax,
                margin: settings.margin, tax: settings.tax,
                date: new Date().toLocaleDateString('ar'), createdAt: new Date()
            });
            clearForm();
        }

        async function updateProduct() {
            if(!editingId) return;
            const name = document.getElementById('productName').value.trim() || 'منتج';
            const price = +document.getElementById('priceSAR').value || 0;
            const ship = +document.getElementById('shipping').value || settings.defaultShipping;
            const custPriceRaw = document.getElementById('customerPrice').value.trim();
            const custPrice = custPriceRaw === '' ? null : +custPriceRaw;
            const cost = price*settings.exchangeRate + ship + settings.otherCosts;
            const taxAmt = cost*(settings.tax/100);
            const withTax = cost+taxAmt;
            const raw = settings.margin>0 ? withTax/(1-settings.margin/100) : withTax;
            const suggested = applyRounding(raw);
            const final = custPrice !== null ? custPrice : suggested;
            await db.collection('products').doc(editingId).update({
                name, priceSAR:price, shipping:ship, totalCost:cost, finalPrice:final,
                customerName: document.getElementById('customerName').value.trim(),
                customerPhone: document.getElementById('customerPhone').value.trim(),
                customerPrice: custPrice, profit: final - withTax,
                margin: settings.margin, tax: settings.tax,
                updatedAt: new Date()
            });
            cancelEdit();
            clearForm();
        }

        function showDeleteModal(id) { deleteId = id; document.getElementById('deleteModal').classList.add('active'); }
        function closeDeleteModal() { deleteId = null; document.getElementById('deleteModal').classList.remove('active'); }
        document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
            if(deleteId) { await db.collection('products').doc(deleteId).delete(); closeDeleteModal(); }
        });

        db.collection('products').orderBy('createdAt','desc').onSnapshot(snap => {
            products = snap.docs.map(d => ({id:d.id, ...d.data()}));
            renderProducts();
        });

        function renderProducts() {
            document.getElementById('productCount').textContent = products.length;
            const list = document.getElementById('productsList');
            if(!products.length) { list.innerHTML = '<div class="empty-state">لا توجد أصناف</div>'; return; }
            list.innerHTML = products.map(p => `
                <div class="product-item">
                    <div>
                        ${p.customerName ? `<div style="color:var(--primary); font-weight:600">👤 ${p.customerName} ${p.customerPhone||''}</div>` : ''}
                        <div class="p-name">${p.name}</div>
                        <div class="p-meta">شراء ${p.priceSAR} ر.س | تكلفة ${fmt(p.totalCost)} ر.ي</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px">
                        <div class="p-price">${fmt(p.customerPrice != null ? p.customerPrice : p.finalPrice)} ر.ي</div>
                        <button class="icon-btn edit-btn" onclick="editProduct(products.find(x=>x.id==='${p.id}'))">
                            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button class="icon-btn delete-btn" onclick="showDeleteModal('${p.id}')">
                            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </div>
                </div>`).join('');
        }

        function exportCSV() {
            if(!products.length) return alert('لا توجد منتجات');
            let csv = '\uFEFFاسم العميل,رقم العميل,المنتج,الشراء,التكلفة,البيع,الربح,الهامش\n';
            products.forEach(p => csv += `${p.customerName||''},${p.customerPhone||''},${p.name},${p.priceSAR},${fmt(p.totalCost)},${fmt(p.finalPrice)},${fmt(p.profit)},${p.margin}%\n`);
            const blob = new Blob([csv],{type:'text/csv'});
            const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='pricing.csv'; a.click();
        }

        function toggleTheme() {
            const html = document.documentElement;
            const isLight = html.getAttribute('data-theme') === 'light';
            html.setAttribute('data-theme', isLight ? 'dark' : 'light');
            document.getElementById('themeIcon').innerHTML = isLight ?
                '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>' :
                '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>';
            localStorage.setItem('theme', isLight ? 'dark' : 'light');
        }
        if(localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('themeIcon').innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>';
        }

        function toggleControlPanel() {
            document.getElementById('controlPanel').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        calculate();
    </script>
</body>
</html>
